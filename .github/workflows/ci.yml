name: CI

env:
  BUN_VERSION: "1.3.13"
  SPECTRA_VERSION: "2.2.5"

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    name: Typecheck, Test, Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build

  spectra:
    name: Spectra Validate
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Spectra CLI
        run: brew install --cask spectra

      - name: Verify Spectra CLI version
        run: spectra --version | grep "spectra ${SPECTRA_VERSION}"

      - name: Validate specs
        run: spectra validate --all
